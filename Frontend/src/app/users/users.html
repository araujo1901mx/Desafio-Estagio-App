<div class="page-wrapper">
  <div class="card">
    <h2>Criar conta</h2>
    <p class="subtitle">Preencha os dados para se cadastrar.</p>

    <div class="alert alert-error"   *ngIf="erro">{{ erro }}</div>
    <div class="alert alert-success" *ngIf="sucesso">{{ sucesso }}</div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="name">Nome completo</label>
        <input id="name" type="text" [(ngModel)]="name"
               name="name" placeholder="Seu nome" required />
      </div>

      <div class="form-group">
        <label for="cpf">CPF</label>
        <input id="cpf" type="text" [(ngModel)]="cpf"
               name="cpf" placeholder="Somente números (11 dígitos)"
               maxlength="11" required />
      </div>

      <div class="form-group">
        <label for="birthday">Data de nascimento</label>
        <input id="birthday" type="date" [(ngModel)]="birthday"
               name="birthday" required />
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input id="password" type="password" [(ngModel)]="password"
               name="password" placeholder="Mínimo 6 caracteres" required />
      </div>

      <button class="btn-primary" type="submit" [disabled]="loading">
        {{ loading ? 'Cadastrando...' : 'Criar conta' }}
      </button>
    </form>

    <p class="link-text">
      Já tem conta? <a routerLink="/login">Fazer login</a>
    </p>
  </div>
</div>
