<div class="page-wrapper">
  <div class="card">
    <h2>Login</h2>
    <p class="subtitle">Informe seu CPF e senha para continuar.</p>

    <div class="alert alert-error" *ngIf="erro">{{ erro }}</div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="cpf">CPF</label>
        <input id="cpf" type="text" [(ngModel)]="cpf"
               name="cpf" placeholder="Somente números"
               maxlength="11" required />
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input id="password" type="password" [(ngModel)]="password"
               name="password" placeholder="Sua senha" required />
      </div>

      <button class="btn-primary" type="submit" [disabled]="loading">
        {{ loading ? 'Aguarde...' : 'Entrar' }}
      </button>
    </form>

    <p class="link-text">
      Não tem conta? <a routerLink="/register">Cadastre-se</a>
    </p>
  </div>
</div>
